aid: apache-systemds
name: Apache SystemDS
description: >-
  Apache SystemDS is an open-source ML system for the end-to-end data science lifecycle from
  data integration, cleaning, and feature engineering to model training, debugging, and deployment.
  It provides a declarative machine learning language (DML), automatic optimization for different
  execution backends (local, distributed Spark), and a Python API (SystemDS Python). SystemDS
  is an Apache Software Foundation top-level project designed for scalable ML workflows.
type: Index
position: Consumer
